version: 2
updates:
  # Keep the GitHub Actions used in this profile repo up to date and secure.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
