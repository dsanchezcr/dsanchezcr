name: Latest YouTube videos

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-youtube
  cancel-in-progress: false

jobs:
  update-readme-with-youtube:
    name: Update README with latest YouTube videos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build YouTube feed list
        id: yt
        run: |
          set -euo pipefail
          # David's own channel: https://www.youtube.com/@dsanchezcr
          # Channel IDs are permanent, so we pin it instead of scraping the
          # channel page. Scraping previously matched a *featured* channel
          # ("Xebia Microsoft Services") and surfaced other people's videos.
          CHANNEL_ID="UCgiAAC6cortZavkdNE5Y4aA"
          # Curated playlists whose videos are mine but were published by other
          # channels (e.g. webinars hosted by Microsoft Reactor / Azure Friday).
          # Add more space-separated playlist IDs here to include them.
          PLAYLIST_IDS="PLAT5O4feenw3Z_tQ9rz0i5mGGQ3Qya9lP" # Webinars
          feed="https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}"
          for pl in ${PLAYLIST_IDS}; do
            feed="${feed},https://www.youtube.com/feeds/videos.xml?playlist_id=${pl}"
          done
          echo "Using feeds: ${feed}"
          echo "feed=${feed}" >> "$GITHUB_OUTPUT"

      - name: Pull latest videos
        if: steps.yt.outputs.feed != ''
        uses: gautamkrishnar/blog-post-workflow@2786e54a01b71aec80a5118c2bd6b5044e842597 # v1
        with:
          feed_list: ${{ steps.yt.outputs.feed }}
          readme_path: "./README.md"
          comment_tag_name: "YOUTUBE-VIDEOS"
          max_post_count: 5
          template: "$newline- 📺 [$title]($url)"
          commit_message: "chore: update latest YouTube videos"
