name: Latest YouTube videos

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-youtube
  cancel-in-progress: false

jobs:
  update-readme-with-youtube:
    name: Update README with latest YouTube videos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve YouTube channel feed
        id: yt
        run: |
          set -euo pipefail
          html="$(curl -fsSL --retry 3 'https://www.youtube.com/@dsanchezcr' || true)"
          if [ -z "${html:-}" ]; then
            echo "Could not fetch YouTube channel page; skipping." >&2
            echo "feed=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cid="$(printf '%s' "$html" | grep -oP '"channelId":"\K[^"]+' | head -n1 || true)"
          if [ -z "${cid:-}" ]; then
            cid="$(printf '%s' "$html" | grep -oP 'channel/\K[A-Za-z0-9_-]{20,}' | head -n1 || true)"
          fi
          if [ -z "${cid:-}" ]; then
            echo "Could not resolve channel id; skipping." >&2
            echo "feed=" >> "$GITHUB_OUTPUT"
          else
            echo "Resolved channel id: $cid"
            echo "feed=https://www.youtube.com/feeds/videos.xml?channel_id=$cid" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull latest videos
        if: steps.yt.outputs.feed != ''
        uses: gautamkrishnar/blog-post-workflow@2786e54a01b71aec80a5118c2bd6b5044e842597 # v1
        with:
          feed_list: ${{ steps.yt.outputs.feed }}
          readme_path: "./README.md"
          comment_tag_name: "YOUTUBE-VIDEOS"
          max_post_count: 5
          template: "$newline- 📺 [$title]($url)"
          commit_message: "chore: update latest YouTube videos"
