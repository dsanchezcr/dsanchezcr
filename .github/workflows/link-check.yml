name: Check README links

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  link-check:
    name: Validate links in READMEs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,429
            --exclude-mail
            ./README.md ./README.es.md ./README.pt.md
          fail: false

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Broken links found in profile READMEs"
          content-filepath: ./lychee/out.md
