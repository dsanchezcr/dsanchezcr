name: Latest blog posts

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-blog
  cancel-in-progress: false

jobs:
  update-readme-with-blog:
    name: Update READMEs with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Pull posts
        uses: gautamkrishnar/blog-post-workflow@2786e54a01b71aec80a5118c2bd6b5044e842597 # v1
        with:
          feed_list: "https://dsanchezcr.com/blog/atom.xml"
          readme_path: "./README.md,./README.es.md,./README.pt.md"
          max_post_count: 5
          commit_message: "chore: update latest blog posts"
