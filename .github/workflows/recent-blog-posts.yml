name: Latest blog posts

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-blog
  cancel-in-progress: false

jobs:
  update-readme-with-blog:
    name: Update READMEs with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://dsanchezcr.com/blog/atom.xml"
          readme_path: "./README.md, ./README.es.md, ./README.pt.md"
          max_post_count: 5
          commit_message: "chore: update latest blog posts"
